<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIZ MOIN — Bio</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #151b23;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #4ade80;
    --accent-dim: rgba(74, 222, 128, 0.12);
    --border: #22292f;
    --danger: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "SF Mono", "Fira Code", "JetBrains Mono", Menlo, monospace;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }
  ::selection { background: var(--accent); color: var(--bg); }
  .container { max-width: 860px; margin: 0 auto; padding: 0 24px 80px; }

  /* Hero */
  .hero { padding: 90px 0 60px; }
  .hero .greet { color: var(--accent); font-size: 15px; margin-bottom: 12px; }
  .hero h1 { font-size: clamp(36px, 7vw, 60px); letter-spacing: -1px; line-height: 1.1; }
  .hero .role { font-size: clamp(20px, 4vw, 30px); color: var(--muted); margin-top: 8px; }
  .hero p.tag { max-width: 560px; margin-top: 24px; color: var(--muted); font-size: 15px; }
  .cursor { display: inline-block; width: 3px; height: 1em; background: var(--accent); vertical-align: text-bottom; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .hero .cta { margin-top: 32px; display: flex; gap: 14px; flex-wrap: wrap; }
  .btn {
    text-decoration: none; font-size: 14px; padding: 10px 22px; border-radius: 6px;
    border: 1px solid var(--accent); color: var(--accent); background: transparent;
    cursor: pointer; font-family: inherit; transition: background 0.2s;
  }
  .btn:hover { background: var(--accent-dim); }
  .btn.solid { background: var(--accent); color: var(--bg); font-weight: 700; }
  .btn.solid:hover { opacity: 0.85; }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.sm { padding: 4px 12px; font-size: 12px; }

  section { padding: 48px 0; border-top: 1px dashed var(--border); }
  h2 { font-size: 22px; margin-bottom: 28px; }
  h2::before { content: "// "; color: var(--accent); }

  /* Experience */
  .timeline { border-left: 2px solid var(--border); padding-left: 28px; }
  .entry { position: relative; padding-bottom: 36px; }
  .entry:last-child { padding-bottom: 0; }
  .entry::before {
    content: ""; position: absolute; left: -35px; top: 6px; width: 12px; height: 12px;
    border-radius: 50%; background: var(--bg); border: 2px solid var(--accent);
  }
  .entry .dates { color: var(--accent); font-size: 13px; }
  .entry h3 { font-size: 17px; margin-top: 4px; }
  .entry .org { color: var(--muted); font-size: 14px; }
  .entry p { color: var(--muted); font-size: 14px; margin-top: 8px; max-width: 620px; }

  /* Projects */
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; }
  .proj {
    display: block; text-decoration: none; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; padding: 22px;
    transition: transform 0.2s, border-color 0.2s; position: relative;
  }
  .proj:hover { transform: translateY(-4px); border-color: var(--accent); }
  .proj .folder { font-size: 22px; }
  .proj h3 { color: var(--text); font-size: 16px; margin-top: 10px; }
  .proj h3 span { color: var(--accent); }
  .proj p { color: var(--muted); font-size: 13px; margin-top: 8px; }
  .proj .stack { margin-top: 14px; color: var(--accent); font-size: 12px; }

  .skills { display: flex; flex-wrap: wrap; gap: 10px; }
  .skill { font-size: 13px; padding: 6px 14px; border-radius: 6px; background: var(--accent-dim); color: var(--accent); }

  .contact p { color: var(--muted); font-size: 15px; max-width: 560px; }
  .contact a.mail { color: var(--accent); text-decoration: none; }
  footer { border-top: 1px dashed var(--border); padding: 24px 0 0; color: var(--muted); font-size: 12px; text-align: center; }
  footer button {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); cursor: pointer; font-family: inherit; font-size: 12px;
    padding: 3px 12px; margin-left: 6px;
  }
  footer button:hover { color: var(--accent); border-color: var(--accent); }

  /* ---------- Admin panel ---------- */
  #adminPanel {
    position: fixed; inset: 0 0 0 auto; width: min(480px, 100%);
    background: var(--surface); border-left: 1px solid var(--border);
    z-index: 100; overflow-y: auto; padding: 24px;
    transform: translateX(100%); transition: transform 0.25s;
  }
  #adminPanel.open { transform: translateX(0); }
  #adminPanel h2 { font-size: 18px; }
  #adminPanel h3 { font-size: 14px; color: var(--accent); margin: 24px 0 10px; }
  .admin-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 10px;
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 56px; }
  .item-card { border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  .item-card .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .item-card .row b { font-size: 13px; }
  .admin-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 24px; padding-top: 16px; border-top: 1px dashed var(--border); }
  .hint { font-size: 11px; color: var(--muted); margin-top: 8px; }
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
  #overlay.show { display: block; }
</style>
</head>
<body>
<div class="container" id="page"></div>

<div id="overlay"></div>
<div id="adminPanel">
  <div class="admin-head">
    <h2>// admin</h2>
    <button class="btn sm" onclick="closeAdmin()">close ✕</button>
  </div>

  <h3>profile</h3>
  <div class="field"><label>Name</label><input id="f_name"></div>
  <div class="field"><label>Role / headline</label><input id="f_role"></div>
  <div class="field"><label>Tagline (about)</label><textarea id="f_tagline"></textarea></div>
  <div class="field"><label>Email</label><input id="f_email"></div>
  <div class="field"><label>WhatsApp number (with country code)</label><input id="f_whatsapp"></div>
  <div class="field"><label>LinkedIn URL</label><input id="f_linkedin"></div>

  <h3>projects</h3>
  <div id="projList"></div>
  <button class="btn sm" onclick="addProject()">+ add project</button>

  <h3>experience</h3>
  <div id="expList"></div>
  <button class="btn sm" onclick="addExp()">+ add experience</button>

  <h3>skills</h3>
  <div class="field"><label>Comma-separated</label><input id="f_skills"></div>

  <div class="admin-actions">
    <button class="btn solid" onclick="saveAll()">Save</button>
    <button class="btn" onclick="exportHtml()">Export HTML</button>
    <button class="btn danger" onclick="resetAll()">Reset defaults</button>
  </div>
  <div class="hint">Changes save to this browser (localStorage). Use "Export HTML" to download a copy of this page with your data baked in — host that file anywhere.</div>
</div>

<script id="savedData" type="application/json">null</script>
<script>
const DEFAULT_DATA = {
  name: "ARIZ MOIN",
  role: "Building Intelligent Tools for Finance & Investing",
  tagline: "Building AI-assisted financial tools that simplify market analysis—real-time trading dashboards, NSE & BSE corporate announcement trackers, and broker-integrated algorithmic trading platforms that turn complex market data into confident decisions.",
  email: "arizmoin96@gmail.com",
  whatsapp: "+918800336192",
  linkedin: "https://www.linkedin.com/in/ariz-moin-66560789",
  skills: ["Python","Flask","JavaScript","Next.js","REST APIs","Market Data (NSE/BSE)","Algo Trading","Git & CI/CD"],
  projects: [
    { icon:"📡", name:"corporate-pulse", url:"https://corporate-pulse.onrender.com", desc:"Real-time NSE/BSE corporate announcements dashboard with AI summaries and live stock quotes.", stack:"Flask · Python · NSE/BSE APIs" },
    { icon:"⚡", name:"Nifty & Bank nifty Option scalper", url:"", desc:"EMA 9/21 scalping system for Nifty/BankNifty with Dhan broker integration, paper/live modes, and automated risk management.", stack:"Python · Dhan API · Algo Trading" }
  ],
  experience: []
};

const LS_KEY = "bio_data_v1";
let DATA = loadData();

function stripPlaceholders(d) {
  if (Array.isArray(d.experience)) {
    d.experience = d.experience.filter(e => !["Job Title Here","Previous Job Title"].includes(e.title));
  }
  if (Array.isArray(d.projects)) {
    d.projects.forEach(p => {
      if (p.name === "corporate-pulse" && !p.url) p.url = "https://corporate-pulse.onrender.com";
    });
  }
  if (d.tagline && d.tagline.startsWith("Real-time trading dashboards, corporate announcement trackers")) {
    d.tagline = DEFAULT_DATA.tagline;
  }
  return d;
}

function loadData() {
  try {
    const ls = localStorage.getItem(LS_KEY);
    if (ls) return stripPlaceholders({ ...DEFAULT_DATA, ...JSON.parse(ls) });
  } catch(e) {}
  try {
    const baked = JSON.parse(document.getElementById("savedData").textContent);
    if (baked) return stripPlaceholders({ ...DEFAULT_DATA, ...baked });
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function fixUrl(u) {
  u = String(u ?? "").trim();
  if (!u || u === "#") return u;
  if (!/^https?:\/\//i.test(u)) u = "https://" + u;
  return u;
}

function render() {
  const d = DATA;
  const projects = d.projects.map(p => `
    <a class="proj" href="${esc(fixUrl(p.url) || '#')}" ${p.url ? 'target="_blank" rel="noopener"' : ''}>
      <div class="folder">${esc(p.icon || "📁")}</div>
      <h3>${esc(p.name)} <span>↗</span></h3>
      <p>${esc(p.desc)}</p>
      <div class="stack">${esc(p.stack)}</div>
    </a>`).join("");
  const exp = d.experience.map(e => `
    <div class="entry">
      <div class="dates">${esc(e.dates)}</div>
      <h3>${esc(e.title)}</h3>
      <div class="org">${esc(e.org)}</div>
      <p>${esc(e.desc)}</p>
    </div>`).join("");
  const skills = d.skills.map(s => `<span class="skill">${esc(s)}</span>`).join("");

  document.getElementById("page").innerHTML = `
    <div class="hero">
      <h1>${esc(d.name)}<span class="cursor"></span></h1>
      <div class="role">${esc(d.role)}</div>
      <p class="tag">${esc(d.tagline)}</p>
      <div class="cta">
        <a class="btn solid" href="https://wa.me/${esc(String(d.whatsapp || "").replace(/\D/g, ""))}" target="_blank" rel="noopener">Get in touch</a>
        <a class="btn" href="${esc(fixUrl(d.linkedin))}" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
    ${d.experience.length ? `<section><h2>experience</h2><div class="timeline">${exp}</div></section>` : ""}
    <section><h2>live projects</h2><div class="grid">${projects}</div></section>
    <section><h2>skills</h2><div class="skills">${skills}</div></section>
    <section class="contact"><h2>contact</h2>
      <p>Open to interesting fintech and market-data problems. Reach me at <a class="mail" href="mailto:${esc(d.email)}">${esc(d.email)}</a>.</p>
    </section>
    <footer>© ${new Date().getFullYear()} ${esc(d.name)} <button onclick="openAdmin()">⚙ admin</button></footer>`;
  document.title = d.name + " — Bio";
}

/* ---------- Admin ---------- */
function openAdmin() {
  fillForms();
  document.getElementById("adminPanel").classList.add("open");
  document.getElementById("overlay").classList.add("show");
}
function closeAdmin() {
  document.getElementById("adminPanel").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}
document.getElementById("overlay").addEventListener("click", closeAdmin);

function fillForms() {
  f_name.value = DATA.name; f_role.value = DATA.role; f_tagline.value = DATA.tagline;
  f_email.value = DATA.email; f_whatsapp.value = DATA.whatsapp || ""; f_linkedin.value = DATA.linkedin;
  f_skills.value = DATA.skills.join(", ");
  renderProjForms(); renderExpForms();
}

function renderProjForms() {
  document.getElementById("projList").innerHTML = DATA.projects.map((p,i) => `
    <div class="item-card">
      <div class="row"><b>#${i+1}</b><button class="btn sm danger" onclick="delProject(${i})">delete</button></div>
      <div class="field"><label>Icon (emoji)</label><input value="${esc(p.icon)}" oninput="DATA.projects[${i}].icon=this.value"></div>
      <div class="field"><label>Name</label><input value="${esc(p.name)}" oninput="DATA.projects[${i}].name=this.value"></div>
      <div class="field"><label>URL</label><input value="${esc(p.url)}" placeholder="https://..." oninput="DATA.projects[${i}].url=this.value"></div>
      <div class="field"><label>Description</label><textarea oninput="DATA.projects[${i}].desc=this.value">${esc(p.desc)}</textarea></div>
      <div class="field"><label>Stack (e.g. Flask · Python)</label><input value="${esc(p.stack)}" oninput="DATA.projects[${i}].stack=this.value"></div>
    </div>`).join("");
}
function addProject() { DATA.projects.push({icon:"📁",name:"new-project",url:"",desc:"",stack:""}); renderProjForms(); }
function delProject(i) { DATA.projects.splice(i,1); renderProjForms(); }

function renderExpForms() {
  document.getElementById("expList").innerHTML = DATA.experience.map((e,i) => `
    <div class="item-card">
      <div class="row"><b>#${i+1}</b><button class="btn sm danger" onclick="delExp(${i})">delete</button></div>
      <div class="field"><label>Dates</label><input value="${esc(e.dates)}" oninput="DATA.experience[${i}].dates=this.value"></div>
      <div class="field"><label>Title</label><input value="${esc(e.title)}" oninput="DATA.experience[${i}].title=this.value"></div>
      <div class="field"><label>Company · City</label><input value="${esc(e.org)}" oninput="DATA.experience[${i}].org=this.value"></div>
      <div class="field"><label>Description</label><textarea oninput="DATA.experience[${i}].desc=this.value">${esc(e.desc)}</textarea></div>
    </div>`).join("");
}
function addExp() { DATA.experience.push({dates:"",title:"New Role",org:"",desc:""}); renderExpForms(); }
function delExp(i) { DATA.experience.splice(i,1); renderExpForms(); }

function saveAll() {
  DATA.name = f_name.value; DATA.role = f_role.value; DATA.tagline = f_tagline.value;
  DATA.email = f_email.value; DATA.whatsapp = f_whatsapp.value; DATA.linkedin = f_linkedin.value;
  DATA.skills = f_skills.value.split(",").map(s => s.trim()).filter(Boolean);
  localStorage.setItem(LS_KEY, JSON.stringify(DATA));
  render(); closeAdmin();
}

function resetAll() {
  if (!confirm("Reset everything to defaults?")) return;
  localStorage.removeItem(LS_KEY);
  DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
  render(); fillForms();
}

function exportHtml() {
  // bake current DATA into the saved-data script tag, then download the page source
  const doc = document.cloneNode(true);
  doc.getElementById("savedData").textContent = JSON.stringify(DATA).replace(/</g, "\\u003c");
  doc.getElementById("adminPanel").classList.remove("open");
  doc.getElementById("overlay").classList.remove("show");
  doc.getElementById("page").innerHTML = "";
  const blob = new Blob(["<!DOCTYPE html>\n" + doc.documentElement.outerHTML], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "bio.html";
  a.click();
  URL.revokeObjectURL(a.href);
}

render();
if (location.hash === "#admin") openAdmin();
window.addEventListener("hashchange", () => { if (location.hash === "#admin") openAdmin(); });
</script>
</body>
</html>
